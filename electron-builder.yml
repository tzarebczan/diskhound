appId: com.diskhound.app
productName: DiskHound
copyright: Copyright © 2026 DiskHound

directories:
  output: release

files:
  - dist-electron/**/*
  - dist-renderer/**/*
  - package.json

extraResources:
  # Copy the compiled Rust scanner binary into resources/native/.
  - from: native/diskhound-native-scanner/target/release/
    to: native/
    filter:
      - "diskhound-native-scanner"
      - "diskhound-native-scanner.exe"
  - from: build/icon.png
    to: icon.png

asar: true
compression: maximum

publish:
  provider: github

icon: build/icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-Setup.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: DiskHound
  runAfterFinish: true
  installerSidebar: null
  uninstallerSidebar: null

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  artifactName: "${productName}-${version}-${arch}.${ext}"

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  artifactName: "${productName}-${version}-${arch}.${ext}"
