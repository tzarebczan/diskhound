name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            electron-builder-args: --win --x64
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            electron-builder-args: --linux --x64
          - os: macos-13
            rust-target: x86_64-apple-darwin
            electron-builder-args: --mac --x64
          - os: macos-14
            rust-target: aarch64-apple-darwin
            electron-builder-args: --mac --arm64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install dependencies
        run: bun install

      - name: Sync package version from tag
        run: bun run sync:version-from-tag ${{ github.ref_name }}

      - name: Build native scanner
        run: cargo build --release --target ${{ matrix.rust-target }} --manifest-path native/diskhound-native-scanner/Cargo.toml

      - name: Stage native scanner for electron-builder
        shell: bash
        run: |
          mkdir -p native/diskhound-native-scanner/target/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp native/diskhound-native-scanner/target/${{ matrix.rust-target }}/release/diskhound-native-scanner.exe native/diskhound-native-scanner/target/release/diskhound-native-scanner.exe
          else
            cp native/diskhound-native-scanner/target/${{ matrix.rust-target }}/release/diskhound-native-scanner native/diskhound-native-scanner/target/release/diskhound-native-scanner
          fi

      - name: Verify native binary exists
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ls -la native/diskhound-native-scanner/target/release/diskhound-native-scanner.exe
          else
            ls -la native/diskhound-native-scanner/target/release/diskhound-native-scanner
          fi

      - name: Build app
        run: bun run build

      - name: Package
        run: npx electron-builder --config electron-builder.yml --publish never ${{ matrix.electron-builder-args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify packaged native binary
        shell: bash
        run: |
          echo "=== Contents of release folder ==="
          ls -la release/ || true
          echo "=== Searching for native scanner ==="
          find release -name "diskhound-native-scanner*" -type f 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.tar.gz
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
